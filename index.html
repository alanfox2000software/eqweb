<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Earthquake Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="filter-bar">
        
        <div>
            <label for="select-time"><b>Time Range:</b></label>
            <select id="select-time">
                <option value="hour">Past 1 Hour</option>
                <option value="day">Past 24 Hours</option>
                <option value="week">Past 1 Week</option>
                <option value="month" selected>Past 1 Month</option>
                <option value="all">All Time (Historical)</option>
            </select>
        </div>

        <div>
            <label for="select-mg"><b>Min Magnitude:</b></label>
            <select id="select-mg">
                <option value="All" selected>All Magnitudes</option>
                <option value="2">M2.0+</option>
                <option value="3">M3.0+</option>
                <option value="4">M4.0+</option>
                <option value="5">M5.0+</option>
                <option value="6">M6.0+</option>
                <option value="7">M7.0+</option>
                <option value="8">M8.0+</option>
            </select>
        </div>

        <div>
            <label for="select-type"><b>Data Source:</b></label>
            <select id="select-type">
                <option value="USGS" selected>USGS ; U.S. Geological Survey</option>
                <option value="EMSC">EMSC ; EU Mediterranean Earthquake Centre</option>
                <option value="BGS">BGS ; British Geological Survey</option>
                <option value="GFZ">GFZ ; Ger Potsdam Earthquake Center</option>
                <option value="JMA">JMA ; Japan Meteorological Agency</option>
                <option value="CHI">CHI ; Chile Earthquake Center</option>
                <option value="CAN">CAN ; Natural Resources Canada</option>
                <option value="INGV">INGV ; Italy Geophysics Institute</option>
                <option value="CWB">CWB ; Taiwan Central Weather Bureau</option>
                <option value="IRSC">IRSC ; Iranian Seismological Center</option>
                <option value="TUR">TUR ; Turkish Disaster and Emergency center</option>
                <option value="CEIC">CEIC ; China Earthquake Networks Center</option>
                <option value="AUS">AUS ; Geoscience Australia</option>
                <option value="NZL">NZL ; New Zealand Earthquake Commission</option>
                <option value="PHIVOLCS">PHIVOLCS ; Philippine Institute of Volcanology and Seismology</option>
                <option value="ROU">ROU ; Romanian National Institute for Earth Physics</option>
                <option value="OVSICORI">OVSICORI ; Costa Rica, the National University</option>
                <option value="BMKG">BMKG ; Indonesia The Meteorology, Climatology, and Geophysics</option>
                <option value="IGEPN">IGEPN ; Instituto Geofísico - Ecuador</option>
                <option value="IGN">IGN ; Spain Instituto Geográfico Nacional</option>
                <option value="IMO">IMO ; Icelandic Met Office</option>
                <option value="INPRES">INPRES ; Argentina Instituto Nacional de Prevención Sísmica</option>
                <option value="SSN">SSN ; México Servicio Sismológico Nacional</option>
                <option value="INDIA">INDIA ; India National Center for Seismology</option>
                <option value="All">All ; All of the above sources</option>
            </select>
        </div>

        <div>
            <label for="select-region"><b>Region:</b></label>
            <select id="select-region">
                <option value="World" selected>Global Overview</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="NorthAmerica">North America</option>
                <option value="SouthAmerica">South America</option>
                <option value="Oceania">Oceania</option>
                <option value="Africa">Africa</option>
                <option value="Antarctica">Antarctica</option>
            </select>
        </div>

        <button id="btn-refresh" style="padding: 4px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            🔄 Refresh
        </button>
    </div>

    <div id="main-container">
        <div id="sidebar">
            <h2>Latest Earthquakes</h2>
            <div id="list-container">Syncing data, please wait...</div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
